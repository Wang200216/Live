# Nginx 反向代理配置 - 小程序API网关
# 用途：为小程序提供统一的API入口，代理到后端服务器

# 上游服务器配置（后端 Node.js 服务）
upstream backend_server {
    # 后端服务器地址
    server 192.168.31.189:8000 weight=1 max_fails=3 fail_timeout=30s;
    
    # 如果有多个后端服务器，可以添加更多：
    # server 192.168.31.190:8000 weight=1 max_fails=3 fail_timeout=30s;
    # server 192.168.31.191:8000 weight=1 max_fails=3 fail_timeout=30s backup;
    
    # 保持长连接
    keepalive 32;
}

# HTTP 服务器配置
server {
    # 监听端口（小程序将访问这个端口）
    listen 80;
    listen [::]:80;
    
    # 服务器名称（可以是域名或IP）
    # 修改为您的实际域名或留空
    server_name _;
    
    # 字符集
    charset utf-8;
    
    # 日志配置
    access_log /var/log/nginx/miniprogram_access.log;
    error_log /var/log/nginx/miniprogram_error.log warn;
    
    # 客户端请求体大小限制（允许上传文件）
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # 超时设置
    proxy_connect_timeout 90;
    proxy_send_timeout 90;
    proxy_read_timeout 90;
    proxy_buffering off;
    
    # ==================== WebSocket 支持 ====================
    # 用于实时通信（辩论内容推送等）
    location /ws {
        proxy_pass http://backend_server;
        
        # WebSocket 必需的头部
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 转发真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 超时设置（保持长连接）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # ==================== API 接口代理 ====================
    # 代理所有 /api/ 开头的请求到后端
    location /api/ {
        # 代理到上游服务器
        proxy_pass http://backend_server;
        
        # 保持长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 转发真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 转发认证头部
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        
        # CORS 支持（如果需要）
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        
        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
    
    # ==================== 后台管理系统 ====================
    # 代理后台管理页面
    location /admin/ {
        proxy_pass http://backend_server;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 后台管理系统的静态资源
    location ~ ^/admin/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend_server;
        
        # 缓存静态资源
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # ==================== 健康检查 ====================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ==================== 根路径 ====================
    location / {
        # 可以返回一个简单的状态页
        return 200 "API Gateway is running\n";
        add_header Content-Type text/plain;
        
        # 或者代理到后端首页
        # proxy_pass http://backend_server;
    }
    
    # ==================== 错误页面 ====================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        return 500 "Service temporarily unavailable\n";
        add_header Content-Type text/plain;
    }
    
    location = /404.html {
        return 404 "Not found\n";
        add_header Content-Type text/plain;
    }
}

